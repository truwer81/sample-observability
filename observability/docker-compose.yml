services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  zipkin:
    image: openzipkin/zipkin:2
    ports:
      - "9411:9411"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:2.2
    depends_on:
      - elasticsearch
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ../logs:/var/log/hello:ro
      - fluentbit_db:/fluent-bit/tail-db
  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    environment:
      SMTP_SMARTHOST: ${SMTP_SMARTHOST:-smtp.example.com:587}
      SMTP_FROM: ${SMTP_FROM:-alerts@example.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-alerts@example.com}
      SMTP_TO: ${SMTP_TO:-alerts@example.com}
    entrypoint: ["/bin/sh", "/etc/alertmanager/render-config.sh"]
    command:
      - "--config.file=/tmp/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/render-config.sh:/etc/alertmanager/render-config.sh:ro
    secrets:
      - smtp_password

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-this-local-password}
volumes:
  esdata:
  fluentbit_db:

secrets:
  smtp_password:
    file: ${SMTP_PASSWORD_FILE:-./secrets/smtp_password.example}
