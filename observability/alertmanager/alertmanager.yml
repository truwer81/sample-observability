global:
  # This file is rendered at container startup. Keep real SMTP credentials out of Git.
  smtp_smarthost: "${SMTP_SMARTHOST}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USERNAME}"
  smtp_auth_password_file: "/run/secrets/smtp_password"
  smtp_require_tls: true

route:
  receiver: "email-default"
  group_by: ["alertname", "job"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 2h

receivers:
  - name: "email-default"
    email_configs:
      - to: "${SMTP_TO}"
        send_resolved: true
        headers:
          subject: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.job }})"
        html: |
          <h3>{{ .CommonLabels.alertname }} — {{ .Status | toUpper }}</h3>
          <p><b>Summary:</b> {{ .CommonAnnotations.summary }}</p>
          <p><b>Description:</b> {{ .CommonAnnotations.description }}</p>
          <p><b>Labels:</b></p>
          <ul>
          {{ range $k, $v := .CommonLabels }}
            <li><b>{{ $k }}:</b> {{ $v }}</li>
          {{ end }}
          </ul>
