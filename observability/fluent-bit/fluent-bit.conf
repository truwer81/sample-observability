[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File /fluent-bit/etc/parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020

[INPUT]
    Name              tail
    Path              /var/log/hello/*.json
    Tag               app.hello
    Refresh_Interval  1
    Read_from_Head    True
    Skip_Long_Lines   On
    DB                /fluent-bit/tail-db/tail.db

    Parser            hello_json

[FILTER]
    Name  modify
    Match app.hello
    Add   env local
    Add   service hello

[OUTPUT]
    Name                es
    Match               app.hello
    Host                elasticsearch
    Port                9200
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     hello-logs